<html>
    <head>
        <title>Add New Country</title>
        <link rel="stylesheet" type="text/css" href="Form.css"/>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    </head>

    <body>
        <h2 style='margin-left: 35%;'>Country Details</h2>
        <form method="post" action="GetCountryDetails.jsp" id="myform" name="myform">
            <table class="FormTable">
                <tr>
                    <td class="Column1">Name : </td>
                    <td class="Column2"><input class="inputtext1" type="text" name="name" size="40" required/></td>
                </tr>
                <tr>
                    <td class="Column1">Official Name : </td>
                    <td class="Column2"><input class="inputtext1" type="text" name="fullName" size="60" required/></td>
                </tr>
                <tr>
                    <td class="Column1">Capital : </td>
                    <td class="Column2"><input class="inputtext1" type="text" name="capital" size="40" required/></td>
                </tr>
            </table>
            <!--Clear Button-->
            <div class="wrapper1">
                <div class="link_wrapper">
                    <a href="" name="clear" id="Clear" >CLEAR</a>
                    <div class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 268.832 268.832">
                            <path d="M265.17 125.577l-80-80c-4.88-4.88-12.796-4.88-17.677 0-4.882 4.882-4.882 12.796 0 17.678l58.66 58.66H12.5c-6.903 0-12.5 5.598-12.5 12.5 0 6.903 5.597 12.5 12.5 12.5h213.654l-58.66 58.662c-4.88 4.882-4.88 12.796 0 17.678 2.44 2.44 5.64 3.66 8.84 3.66s6.398-1.22 8.84-3.66l79.997-80c4.883-4.882 4.883-12.796 0-17.678z"/>
                        </svg>
                    </div>
                </div>
            </div>
            <!--Submit Button-->
            <div class="wrapper2">
                <div class="link_wrapper">
                    <a><button type="submit" name="submit" id="Submit" value="Submit">SUBMIT!</button></a>
                    <div class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 268.832 268.832">
                            <path d="M265.17 125.577l-80-80c-4.88-4.88-12.796-4.88-17.677 0-4.882 4.882-4.882 12.796 0 17.678l58.66 58.66H12.5c-6.903 0-12.5 5.598-12.5 12.5 0 6.903 5.597 12.5 12.5 12.5h213.654l-58.66 58.662c-4.88 4.882-4.88 12.796 0 17.678 2.44 2.44 5.64 3.66 8.84 3.66s6.398-1.22 8.84-3.66l79.997-80c4.883-4.882 4.883-12.796 0-17.678z"/>
                        </svg>
                    </div>
                </div>
            </div>
        </form>
    </body>
</html>
